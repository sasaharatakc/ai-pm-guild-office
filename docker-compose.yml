services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aipm
      POSTGRES_PASSWORD: aipm
      POSTGRES_DB: aipm
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aipm
      MINIO_ROOT_PASSWORD: aipmsecret
    ports:
      - "9000:9000"
      - "9001:9001"
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/aipmsecret
    ports:
      - "7474:7474"
      - "7687:7687"
